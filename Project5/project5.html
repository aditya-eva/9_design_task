<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Controls</title>
  <link rel="stylesheet" href="style5.css">
</head>
<body>
  <div class="panel">
    <div class="control">
      <label>Width: <span id="widthValue">100</span></label>
      <input type="range" id="width" min="50" max="4000" value="400">
    </div>
    <div class="control">
      <label>Height: <span id="heightValue">150</span></label>
      <input type="range" id="height" min="50" max="4000" value="150">
    </div>
    <div class="control">
      <label>Depth: <span id="depthValue">20</span></label>
      <input type="range" id="depth" min="5" max="1000" value="50">
    </div>
    <div class="control">
      <label>Hole Diameter: <span id="holeValue">40</span></label>
      <input type="range" id="hole" min="5" max="200" value="10">
    </div>
    <div class="control">
      <label>W1: <span id="w1Value">60</span></label>
      <input type="range" id="w1" min="10" max="2000" value="40">
    </div>
  </div>
  <script type="module" src="project5.js"></script>
</body>
</html>
