<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualization</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div id="ui">
    <h2>⬡ Window Config</h2>


    <p class="section-label">Frame Dimensions</p>
    <div class="row">
        <div>
        <label>Length</label>
        <input type="number" id="length" value="300" step="10">
        </div>
        <div>
        <label>Breadth</label>
        <input type="number" id="breadth" value="200" step="10">
        </div>
    </div>


    <p class="section-label">Section Profile</p>
    <div class="row">
        <div>
        <label>Outer W</label>
        <input type="number" id="outerWidth" value="40" step="1">
        </div>
        <div>
        <label>Outer H</label>
        <input type="number" id="outerHeight" value="30" step="1">
        </div>
    </div>
    <div class="row">
        <div>
        <label>Outer H1</label>
        <input type="number" id="outerH1" value="20" step="1">
        </div>
        <div>
        <label>Bead H</label>
        <input type="number" id="beadHeight" value="20" step="1">
        </div>
    </div>
    <div class="row">
        <div>
        <label>Bead W</label>
        <input type="number" id="beadWidth" value="12" step="1">
        </div>
        <div></div>
    </div>


    <p class="section-label">Handle</p>


    <div class="row">
        <div>
        <label>Handle Depth</label>
        <input type="number" id="handleDepth" value="5" step="1">
        </div>
        <div>
        <label>Backset Depth</label>
        <input type="number" id="backSetDepth" value="5" step="1">
        </div>
    </div>


    <div class="row">
        <div>
        <label>Handle Length</label>
        <input type="number" id="handleLength" value="150" step="1">
        </div>
        <div>
        <label>Handle Width</label>
        <input type="number" id="handleWidth" value="40" step="1">
        </div>
    </div>


    <label>Side</label>
    <select id="side">
        <option value="left">Left</option>
        <option value="right">Right</option>
    </select>


    <label>Position (Inside/Outside)</label>
    <select id="handleSide">
        <option value="inside">Inside</option>
        <option value="outside">Outside</option>
    </select>


    <label>Position on Bar</label>
    <select id="handlePosition">
        <option value="right">Right bar</option>
        <option value="left">Left bar</option>
        <option value="top">Top bar</option>
        <option value="bottom">Bottom bar</option>
    </select>


    <p class="section-label">Display</p>
    <label>Material</label>
    <select id="material">
        <option value="normal">Normal (Cyan)</option>
        <option value="wireframe">Wireframe</option>
        <option value="metallic">Metallic</option>
    </select>


    <p class="section-label">GHH Value</p>
    <div class="row">
        <div>
        <label>GHH</label>
        <input type="number" id="ghh" value="100" step="1">
        </div>
        <div></div>
    </div>
   
    <button id="update">↺ Rebuild Scene</button>
    <div id="status"></div>
    </div>
    <script type="module" src="index.js"></script>
</body>
</html>
